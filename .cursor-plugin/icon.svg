<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26251e"/>
      <stop offset="100%" stop-color="#1a1914"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded square background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Orange stamp border -->
  <rect x="36" y="62" width="184" height="132" rx="8" fill="none" stroke="#f54e00" stroke-width="6"/>
  <!-- FA text -->
  <text x="128" y="143" text-anchor="middle" dominant-baseline="central"
        font-family="'Bebas Neue', Impact, 'Arial Narrow Bold', sans-serif"
        font-size="88" font-weight="700" letter-spacing="0.04em" fill="#f54e00">FA</text>
  <!-- Checkmark accent — approval metaphor -->
  <circle cx="200" cy="68" r="24" fill="#f54e00"/>
  <polyline points="189,68 197,76 213,60" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
